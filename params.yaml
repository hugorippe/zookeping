rolling:
  min_train_years: 8
  min_test_years: 5
  n_runs: 10

pca:
  n_values: [1, 2, 3,4, 5,6,7,8]

bayesian:
  num_iters: 5000
  v_slab: 20
  v_spike: 1.0e-5
  prior_prob: 0.5
  sigma_sq: 1

rp_pca:
  n_values: [1, 2, 3,4, 5,6,7,8]
  gamma: 10.0

dlfm:
  n_values: [1, 2, 3,4, 5,6,7,8]
  hidden_dims: [64, 32]
  lr: 0.001
  epochs: 100
  dropout: 0.2
  weight_decay: 0.01

sensitivity:
  ridge_alphas: [0.1, 0.5, 1.0, 2.5, 5.0, 10.0, 25.0, 50.0, 100.0]
  lasso_alphas: [0.001, 0.0025, 0.005, 0.0075, 0.01, 0.015, 0.025, 0.05]
  models: ["FF3", "FF5", "StandardOLS", "PCA", "RPPCA", "DLFM"]

configs:
  # OLS configs
  - {estimator: "ols", regularization: "none"}
  - {estimator: "ols", regularization: "lasso", alpha: 0.005}
  - {estimator: "ols", regularization: "lasso", alpha: 0.01}
  - {estimator: "ols", regularization: "lasso", alpha: 0.015}
  - {estimator: "ols", regularization: "lasso", alpha: 0.025}
  - {estimator: "ols", regularization: "lasso", alpha: 0.05}
  - {estimator: "ols", regularization: "ridge", alpha: 0.5}
  - {estimator: "ols", regularization: "ridge", alpha: 1.0}
  - {estimator: "ols", regularization: "ridge", alpha: 2.5}
  - {estimator: "ols", regularization: "ridge", alpha: 5.0}
  - {estimator: "ols", regularization: "ridge", alpha: 10.0}
  # GLS configs
  - {estimator: "gls", regularization: "none"}
  - {estimator: "gls", regularization: "lasso", alpha: 0.005}
  - {estimator: "gls", regularization: "lasso", alpha: 0.01}
  - {estimator: "gls", regularization: "lasso", alpha: 0.015}
  - {estimator: "gls", regularization: "lasso", alpha: 0.025}
  - {estimator: "gls", regularization: "lasso", alpha: 0.05}
  - {estimator: "gls", regularization: "ridge", alpha: 0.5}
  - {estimator: "gls", regularization: "ridge", alpha: 1.0}
  - {estimator: "gls", regularization: "ridge", alpha: 2.5}
  - {estimator: "gls", regularization: "ridge", alpha: 5.0}
  - {estimator: "gls", regularization: "ridge", alpha: 10.0}
